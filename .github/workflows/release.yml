name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/voidmind-io/voidllm:${{ steps.version.outputs.version }}
            ghcr.io/voidmind-io/voidllm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign container image
        run: |
          cosign sign --yes \
            ghcr.io/voidmind-io/voidllm@${{ steps.build.outputs.digest }}

  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X 'github.com/voidmind-io/voidllm/internal/api/health.Version=${VERSION}'"
          declare -A TARGETS=(
            ["linux/amd64"]="voidllm-linux-amd64.tar.gz"
            ["linux/arm64"]="voidllm-linux-arm64.tar.gz"
            ["windows/amd64"]="voidllm-windows-amd64.zip"
            ["windows/arm64"]="voidllm-windows-arm64.zip"
            ["darwin/amd64"]="voidllm-darwin-amd64.tar.gz"
            ["darwin/arm64"]="voidllm-darwin-arm64.tar.gz"
          )
          mkdir -p dist
          for TARGET in "${!TARGETS[@]}"; do
            OS="${TARGET%/*}"
            ARCH="${TARGET#*/}"
            ARCHIVE="${TARGETS[$TARGET]}"
            BINARY="voidllm"
            if [ "$OS" = "windows" ]; then
              BINARY="voidllm.exe"
            fi
            BUILDDIR="dist/build-${OS}-${ARCH}"
            mkdir -p "$BUILDDIR"
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" go build \
              -ldflags="$LDFLAGS" \
              -o "$BUILDDIR/$BINARY" ./cmd/voidllm
            if [[ "$ARCHIVE" == *.tar.gz ]]; then
              tar -czf "dist/$ARCHIVE" -C "$BUILDDIR" "$BINARY"
            else
              (cd "$BUILDDIR" && zip "../$ARCHIVE" "$BINARY")
            fi
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.zip --clobber

  provenance:
    needs: docker
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ghcr.io/voidmind-io/voidllm
      digest: ${{ needs.docker.outputs.digest }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}
